name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docussaurus/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./docussaurus/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./docussaurus

      - name: Build website
        run: npm run build
        working-directory: ./docussaurus

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docussaurus/build
